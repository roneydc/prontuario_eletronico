<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MedFlow - Configurações</title>

  <!-- GOOGLE FONTS -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- CSS -->

  <!-- GLOBAL -->

  <link rel="stylesheet" href="../../styles/global.css" />

  <!-- COMPONENTS -->

  <link rel="stylesheet" href="../../components/sidebar/sidebar.css" />

  <!-- PAGE -->

  <link rel="stylesheet" href="./configuracoes.css" />

  <!-- RESPONSIVE -->

  <link rel="stylesheet" href="../../styles/responsive.css" />

</head>

<body>

  <div class="layout">

    <!-- SIDEBAR -->
     <div id="sidebar-container"></div>

    <!-- MAIN -->

    <main class="main">

      <!-- TOPBAR -->

      <header class="topbar">

        <div>

          <h2>Configurações</h2>

          <p>
            Personalize o sistema e configure informações da clínica.
          </p>

        </div>

        <button class="btn">

          Salvar Alterações

        </button>

      </header>

      <!-- GRID -->

      <section class="settings-grid">

        <!-- PERFIL -->

        <section class="panel">

          <div class="panel-header">

            <h3>Perfil Profissional</h3>

          </div>

          <form class="settings-form">

            <div class="form-group">

              <label>Nome do Profissional</label>

              <input
                type="text"
                placeholder="Digite seu nome"
                value="Dr(a). Responsável"
              />

            </div>

            <div class="form-group">

              <label>Especialidade</label>

              <input
                type="text"
                placeholder="Ex: Fisioterapia Ortopédica"
              />

            </div>

            <div class="form-group">

              <label>Telefone</label>

              <input
                type="text"
                placeholder="(00) 00000-0000"
              />

            </div>

            <div class="form-group">

              <label>E-mail</label>

              <input
                type="email"
                placeholder="email@clinica.com"
              />

            </div>

          </form>

        </section>

        <!-- CLÍNICA -->

        <section class="panel">

          <div class="panel-header">

            <h3>Dados da Clínica</h3>

          </div>

          <form class="settings-form">

            <div class="form-group">

              <label>Nome da Clínica</label>

              <input
                type="text"
                placeholder="Nome da clínica"
              />

            </div>

            <div class="form-group">

              <label>CNPJ</label>

              <input
                type="text"
                placeholder="00.000.000/0000-00"
              />

            </div>

            <div class="form-group">

              <label>Endereço</label>

              <input
                type="text"
                placeholder="Rua, número e bairro"
              />

            </div>

            <div class="form-group">

              <label>Observações</label>

              <textarea
                rows="5"
                placeholder="Informações adicionais..."
              ></textarea>

            </div>

          </form>

        </section>

      </section>

      <!-- SYSTEM -->

      <section class="panel">

        <div class="panel-header">

          <h3>Configurações do Sistema</h3>

        </div>

        <div class="system-settings">

          <!-- ITEM -->

          <div class="setting-item">

            <div>

              <h4>Modo Escuro</h4>

              <p>
                Ativar tema escuro do sistema.
              </p>

            </div>

            <label class="switch">

              <input type="checkbox" />

              <span class="slider"></span>

            </label>

          </div>

          <!-- ITEM -->

          <div class="setting-item">

            <div>

              <h4>Backup Automático</h4>

              <p>
                Realizar backup automático diariamente.
              </p>

            </div>

            <label class="switch">

              <input type="checkbox" checked />

              <span class="slider"></span>

            </label>

          </div>

          <!-- ITEM -->

          <div class="setting-item">

            <div>

              <h4>Notificações</h4>

              <p>
                Receber alertas e lembretes do sistema.
              </p>

            </div>

            <label class="switch">

              <input type="checkbox" checked />

              <span class="slider"></span>

            </label>

          </div>

        </div>



    </main>

  </div>

  <!-- JS -->

  <script src="./configuracoes.js"></script>
  <script src="../../components/sidebar/sidebar.js"></script>

<script>

  loadSidebar("configuracoes");

</script>
</body>

</html>
